<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Communicator — free gesture-to-speech AAC app</title>
<meta name="description" content="Free communication app for people who cannot speak. The camera recognises head turns, blinks and hand gestures and speaks your phrases aloud — or plays recordings of your own voice. No install, no account, works offline in the browser, 7 languages. All processing stays on your device." />
<meta property="og:title" content="Communicator — free gesture-to-speech AAC app" />
<meta property="og:description" content="Turn head movements, blinks and hand gestures into spoken phrases. Free, private, no install — for people who cannot speak or sign." />
<meta property="og:type" content="website" />
<style>
  :root{
    --bg:#0b1016; --panel:#141b23; --panel2:#0e151b; --ink:#f2f6f9; --muted:#8b99a6;
    --line:#26333f; --accent:#37b6e0; --good:#35c37a; --warn:#f0a83f; --bad:#ef5350;
    --shadow:0 2px 6px rgba(0,0,0,.35), 0 12px 32px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;height:100%}
  body{display:flex;flex-direction:column;
    background:radial-gradient(80% 50% at 50% -10%, #12202c 0%, var(--bg) 60%)}

  header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;flex:none;
    flex-wrap:wrap;row-gap:8px}
  html,body{max-width:100%;overflow-x:hidden}
  .h-title{font-size:21px;font-weight:800;letter-spacing:.05em;
    background:linear-gradient(100deg,var(--ink) 40%,var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
  .h-title small{display:block;font-size:10.5px;font-weight:650;color:var(--muted);letter-spacing:.22em;
    -webkit-text-fill-color:var(--muted)}
  .h-btns{display:flex;gap:8px}
  .icon-btn{min-width:50px;height:50px;border-radius:12px;border:1px solid var(--line);background:var(--panel);
    color:var(--ink);font-size:21px;cursor:pointer;padding:0 14px;white-space:nowrap}
  .icon-btn.active{background:var(--accent);color:#02202b;border-color:var(--accent)}
  .chipflag{width:30px;height:20px;border-radius:4px;vertical-align:middle}
  .chipmark{margin-left:5px;font-size:15px;vertical-align:middle}
  @media (max-width:879px){
    .h-title{font-size:16px}
    .h-title small{font-size:9px;letter-spacing:.16em}
    .h-btns{gap:5px}
    .icon-btn{min-width:40px;height:40px;font-size:17px;padding:0 8px;border-radius:10px}
    .chipflag{width:24px;height:16px}
    .chipmark{font-size:13px;margin-left:3px}
  }

  main{flex:1;overflow-y:auto;padding:0 18px 28px}
  .view{max-width:1060px;margin:0 auto}

  .lang-cards{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
  .lang-card{background:var(--panel);border:2px solid var(--line);border-radius:16px;padding:14px 16px 12px;
    text-align:center;min-width:148px;box-shadow:var(--shadow);transition:border-color .25s ease}
  .lang-card.active{border-color:var(--accent)}
  .flag{width:76px;height:50px;border-radius:8px;display:block;margin:0 auto 8px;
    box-shadow:0 2px 8px rgba(0,0,0,.45)}
  .lang-name{font-size:15px;font-weight:750;margin-bottom:9px}
  .gender-pair{display:flex;gap:6px;justify-content:center}
  .g-btn{border:1px solid var(--line);background:var(--panel2);color:var(--muted);border-radius:999px;
    padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer}
  .g-btn.active{background:var(--accent);border-color:var(--accent);color:#02202b}

  /* ---- main view ---- */
  #spoken{min-height:110px;display:flex;align-items:center;justify-content:center;text-align:center;
    font-size:clamp(30px,6vw,58px);font-weight:800;line-height:1.12;padding:14px 8px;
    color:var(--good);text-wrap:balance}
  #spoken.dim{color:#3a4a58;font-size:22px;font-weight:600}

  .cols{display:flex;flex-direction:column;gap:16px}
  .stage-wrap{flex:none}
  .stage{position:relative;border-radius:18px;overflow:hidden;background:#000;
    border:2px solid var(--line);box-shadow:var(--shadow);max-width:320px;margin:0 auto;
    transition:border-color .4s ease}
  .stage.seen{border-color:rgba(53,195,122,.55)}
  video{width:100%;display:block;transform:scaleX(-1)}
  .status-pill{position:absolute;top:10px;left:10px;font-size:13px;font-weight:700;padding:6px 12px;border-radius:999px;
    background:rgba(0,0,0,.55);color:var(--muted)}
  .status-pill.on{color:var(--good)}
  .yaw-meter{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:60%;height:8px;
    background:rgba(255,255,255,.12);border-radius:4px}
  .yaw-dot{position:absolute;top:-4px;width:16px;height:16px;border-radius:50%;background:var(--accent);
    left:50%;transform:translateX(-50%)}

  /* desktop: camera grows, commands sit beside it */
  @media (min-width:880px){
    .cols{flex-direction:row;align-items:flex-start}
    .stage{max-width:none;width:460px}
    .cmd-grid{flex:1}
  }

  /* phone: everything compact so the video AND all commands fit on screen */
  @media (max-width:879px){
    header{padding:10px 14px}
    .stage{max-width:200px}
    #spoken{min-height:64px;font-size:clamp(22px,7vw,30px);padding:8px 6px}
    #spoken.dim{font-size:17px}
    .cmd-grid{grid-template-columns:repeat(2,1fr);gap:6px}
    .cmd-card{padding:7px 10px;border-radius:10px}
    .cmd-name{display:none}
    .cmd-text{font-size:13.5px;margin-top:0;line-height:1.2}
    .cmd-ico{font-size:17px;margin-left:4px}
    .bigbtn{padding:13px;font-size:16px;margin-top:10px}
    #log{font-size:12.5px;line-height:1.7}
  }

  .cmd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;align-content:start}
  .cmd-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 14px;
    position:relative;overflow:hidden;box-shadow:var(--shadow)}
  .cmd-card.hot{border-color:var(--good)}
  .cmd-ico{font-size:24px;float:right;margin-left:6px}
  .cmd-name{font-size:11px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
  .cmd-text{font-size:16px;font-weight:750;margin-top:3px;line-height:1.25}
  .cmd-card .bar{position:absolute;left:0;right:0;bottom:0;height:4px}
  .cmd-card .bar i{display:block;height:100%;width:0;background:var(--good)}

  .below{max-width:1060px;margin:0 auto}
  .bigbtn{width:100%;padding:17px;font-size:18px;font-weight:750;border:none;border-radius:14px;cursor:pointer;
    background:var(--accent);color:#02202b;margin-top:16px;box-shadow:var(--shadow)}
  .bigbtn.paused{background:var(--warn)}
  #log{margin-top:14px;color:var(--muted);font-size:14px;line-height:1.9}
  #log b{color:var(--ink)}

  /* ---- settings ---- */
  h2{font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:26px 0 10px}
  .g-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
  .g-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .g-name{font-weight:750;font-size:16px;flex:1}
  .g-icon{font-size:24px;width:36px;text-align:center}
  .switch{position:relative;width:52px;height:30px;flex:none}
  .switch input{opacity:0;width:0;height:0;position:absolute}
  .switch .tr{position:absolute;inset:0;background:var(--line);border-radius:999px;transition:.2s;cursor:pointer}
  .switch .tr::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;
    background:#fff;transition:.2s}
  .switch input:checked + .tr{background:var(--good)}
  .switch input:checked + .tr::after{transform:translateX(22px)}
  .g-row{display:flex;gap:8px}
  .g-row input[type=text]{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:12px;font-size:16px;min-width:0}
  .sm-btn{border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:10px;
    padding:0 14px;font-size:16px;cursor:pointer;min-height:46px}
  .sm-btn.rec{color:var(--bad)}
  .sm-btn.rec.recording{background:var(--bad);color:#fff;animation:recblink 1s infinite}
  @keyframes recblink{50%{opacity:.6}}
  .g-voice{font-size:12.5px;color:var(--muted);margin-top:8px}
  .g-voice b{color:var(--good)}
  .voice-warn{font-size:13px;color:var(--warn);margin-top:10px;line-height:1.5}

  .set-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}
  .set-row:last-child{border-bottom:none}
  .set-row label{font-size:15px;font-weight:600}
  .set-row .d{display:block;font-size:12.5px;color:var(--muted);font-weight:400;margin-top:2px;max-width:40ch}
  select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:10px;font-size:15px;max-width:46%}
  input[type=range]{width:170px;accent-color:var(--accent)}
  .val{font-size:13px;color:var(--muted);min-width:52px;text-align:right}

  .footer-note{color:#5a6a78;font-size:12.5px;line-height:1.6;margin-top:22px}
  .app-foot{margin-top:26px;text-align:center;font-size:12.5px;color:#5a6a78;line-height:1.7}
  .app-foot a{display:inline-block;margin-top:6px;color:#8b99a6;text-decoration:none;max-width:52ch}
  .app-foot a:hover{color:var(--accent)}
  #donateMsg{margin-top:6px;color:#8b99a6;max-width:52ch;margin-left:auto;margin-right:auto}
  .app-foot a.donate-btn{margin-top:12px;padding:12px 28px;border-radius:999px;background:#ff5e5b;
    color:#fff;font-size:15px;font-weight:700;text-decoration:none;max-width:none}
  .app-foot a.donate-btn:hover{background:#ff7a77;color:#fff}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--panel);
    border:1px solid var(--line);padding:12px 20px;border-radius:12px;font-size:15px;font-weight:600;
    opacity:0;transition:.25s;pointer-events:none;z-index:50;max-width:92vw;text-align:center}
  .toast.show{opacity:1}
  .hidden{display:none !important}
  #loading{padding:40px 10px;text-align:center;color:var(--muted);font-size:17px;line-height:1.7}

  /* instructions overlay */
  .modal-veil{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:40;display:none;overflow-y:auto;padding:20px 14px 40px}
  .modal-veil.show{display:block}
  .modal{max-width:640px;margin:0 auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
  .modal h3{margin:0 0 4px;font-size:20px}
  .modal .sub2{color:var(--muted);font-size:14px;margin:0 0 16px;line-height:1.5}
  .instr{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--line);align-items:flex-start}
  .instr:last-of-type{border-bottom:none}
  .instr .ic{font-size:30px;width:42px;text-align:center;flex:none}
  .instr b{display:block;font-size:15.5px;margin-bottom:3px}
  .instr p{margin:0;color:#b9c4cf;font-size:14.5px;line-height:1.55}
  .tips{background:var(--panel2);border-radius:12px;padding:14px;margin-top:16px;font-size:14px;line-height:1.7;color:#b9c4cf}
  .tips b{color:var(--ink)}
</style>
</head>
<body>
<header>
  <div class="h-title" id="hTitle">COMMUNICATOR<small id="hSub">MOVEMENT → VOICE</small></div>
  <div class="h-btns">
    <button class="icon-btn lang-chip" id="langBtn" title="Language / voice"></button>
    <button class="icon-btn" id="helpBtn" title="Instructions">?</button>
    <button class="icon-btn" id="fsBtn" title="Fullscreen">⛶</button>
    <button class="icon-btn" id="viewBtn" title="Settings">⚙</button>
  </div>
</header>

<main>
  <!-- ================= MAIN VIEW ================= -->
  <div class="view" id="mainView">
    <div id="loading">Starting the camera and loading recognition …<br>
      <span style="font-size:13px">(the first time takes a while — the models are downloading)</span></div>
    <div id="spoken" class="dim hidden"></div>
    <div class="cols hidden" id="cols">
      <div class="stage-wrap">
        <div class="stage" id="stage">
          <video id="video" autoplay playsinline muted></video>
          <div class="status-pill" id="statusPill">—</div>
          <div class="yaw-meter"><div class="yaw-dot" id="yawDot"></div></div>
        </div>
      </div>
      <div class="cmd-grid" id="armedRow"></div>
    </div>
    <div class="below">
      <button class="bigbtn hidden" id="pauseBtn"></button>
      <div id="log"></div>
      <div class="app-foot">
        <div id="deviceNote"></div>
        <div id="donateMsg" class="hidden"></div>
        <a id="donateBtn" class="donate-btn hidden" href="donate.html" target="_blank" rel="noopener"></a>
      </div>
    </div>
  </div>

  <!-- ================= SETTINGS VIEW ================= -->
  <div class="view hidden" id="settingsView">
    <h2 id="secGestures"></h2>
    <div id="gestureList"></div>

    <h2 id="secVoice"></h2>
    <div class="g-card">
      <div class="set-row">
        <label id="voiceLbl"><span class="d" id="voiceDesc"></span></label>
        <select id="voiceSel"></select>
      </div>
      <div class="set-row">
        <label id="genderLbl"></label>
        <select id="genderSel">
          <option value="auto"></option>
          <option value="female"></option>
          <option value="male"></option>
        </select>
      </div>
      <div class="set-row">
        <label id="rateLbl"></label>
        <input type="range" id="rateRange" min="0.5" max="1.5" step="0.05">
        <span class="val" id="rateVal"></span>
      </div>
      <div class="voice-warn hidden" id="voiceWarn"></div>
    </div>

    <h2 id="secSens"></h2>
    <div class="g-card">
      <div class="set-row">
        <label id="holdLbl"><span class="d" id="holdDesc"></span></label>
        <input type="range" id="holdRange" min="300" max="2000" step="100">
        <span class="val" id="holdVal"></span>
      </div>
      <div class="set-row">
        <label id="yawLbl"><span class="d" id="yawDesc"></span></label>
        <input type="range" id="yawRange" min="0.10" max="0.45" step="0.01">
        <span class="val" id="yawVal"></span>
      </div>
      <div class="set-row">
        <label id="pitchLbl"><span class="d" id="pitchDesc"></span></label>
        <input type="range" id="pitchRange" min="0.08" max="0.40" step="0.01">
        <span class="val" id="pitchVal"></span>
      </div>
      <div class="set-row">
        <label id="blinkLbl"><span class="d" id="blinkDesc"></span></label>
        <input type="range" id="blinkRange" min="400" max="2000" step="100">
        <span class="val" id="blinkVal"></span>
      </div>
      <div class="set-row">
        <label id="coolLbl"><span class="d" id="coolDesc"></span></label>
        <input type="range" id="coolRange" min="1000" max="8000" step="500">
        <span class="val" id="coolVal"></span>
      </div>
      <div class="set-row">
        <label id="swapLbl"><span class="d" id="swapDesc"></span></label>
        <label class="switch"><input type="checkbox" id="swapLR"><span class="tr"></span></label>
      </div>
    </div>

    <h2 id="secBackup"></h2>
    <div class="g-card">
      <div class="set-row">
        <label id="exportLbl"><span class="d" id="exportDesc"></span></label>
        <button class="sm-btn" id="exportBtn"></button>
      </div>
      <div class="set-row">
        <label id="importLbl"></label>
        <button class="sm-btn" id="importBtn"></button>
        <input type="file" id="importFile" accept=".json" class="hidden">
      </div>
    </div>

    <p class="footer-note" id="footNote"></p>
  </div>

  <!-- ================= LANGUAGE / VOICE PICKER ================= -->
  <div class="modal-veil" id="langVeil">
    <div class="modal">
      <div class="lang-cards" id="langCards"></div>
    </div>
  </div>

  <!-- ================= INSTRUCTIONS ================= -->
  <div class="modal-veil" id="helpVeil">
    <div class="modal">
      <h3 id="helpTitle"></h3>
      <p class="sub2" id="helpSub"></p>
      <div id="instrList"></div>
      <div class="tips" id="tipsBox"></div>
      <button class="bigbtn" id="helpClose"></button>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
import { FilesetResolver, FaceLandmarker, GestureRecognizer }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

"use strict";
const $ = id => document.getElementById(id);

// The ONLY line that differs between the two deployments:
// ecksquad.github.io/communicator  -> false (clean, no donation anywhere)
// ecksquad.github.io/communicator2 -> true  (footer link to donate.html)
const SHOW_DONATE = false;

/* ================= gestures (language-neutral) ================= */
const GESTURES = [
  { id:"headRight",   icon:"👉", type:"head"  },

/* Phrases are stored PER LANGUAGE - each language always has its own
   complete set, so defaults can never leak between languages. A custom
   phrase belongs to the language it was typed in. */
function loadCfg(){
  let c;
  try { c = Object.assign(JSON.parse(JSON.stringify(DEF_CFG)), JSON.parse(localStorage.getItem("commcfg")||"{}")); }
  catch(e){ c = JSON.parse(JSON.stringify(DEF_CFG)); }
  if(!LANGS.includes(c.lang)) c.lang="en";
  if(!c.textsByLang || typeof c.textsByLang!=="object") c.textsByLang={};
  for(const l of LANGS){
    if(!c.textsByLang[l]) c.textsByLang[l]={};
    for(const g of GESTURES){
      if(typeof c.enabled[g.id]==="undefined") c.enabled[g.id]=true;
      if(typeof c.textsByLang[l][g.id]==="undefined") c.textsByLang[l][g.id]=STR[l].g[g.id].def;
    }
  }
  // legacy single-map configs: carry over ONLY genuine custom phrases
  // (anything that was ever a default just regenerates per language)
  if(c.texts){
    for(const g of GESTURES){
      const old=c.texts[g.id];
      if(typeof old==="string" && old &&
         !(OLD_DEFS[g.id]||[]).includes(old) &&
         !LANGS.some(l=>STR[l].g[g.id].def===old)){
        c.textsByLang[c.lang][g.id]=old;
      }
    }
    delete c.texts;
  }
  return c;
}
function saveCfg(){ localStorage.setItem("commcfg", JSON.stringify(cfg)); }
function TX(){ return cfg.textsByLang[cfg.lang]; }

function switchLang(newLang){
  if(newLang===cfg.lang) return;
  cfg.lang=newLang;
  cfg.voiceURI="";           // re-pick the best voice for the new language
  saveCfg();
  applyLang();
  pickVoice();
  buildMainChips();
  buildSettings();
}

/* ================= recordings (IndexedDB) ================= */
const idb = {
  db:null,
  open(){ return new Promise((res)=>{ const r=indexedDB.open("commrec",1);
    r.onupgradeneeded=()=>r.result.createObjectStore("rec");
    r.onsuccess=()=>{ idb.db=r.result; res(); }; r.onerror=()=>res(); }); },
  put(k,blob){ return new Promise((res)=>{ if(!idb.db)return res();
    const t=idb.db.transaction("rec","readwrite"); t.objectStore("rec").put(blob,k);
    t.oncomplete=res; t.onerror=res; }); },
  get(k){ return new Promise((res)=>{ if(!idb.db)return res(null);
    const q=idb.db.transaction("rec").objectStore("rec").get(k);
    q.onsuccess=()=>res(q.result||null); q.onerror=()=>res(null); }); },
  del(k){ return new Promise((res)=>{ if(!idb.db)return res();
    const t=idb.db.transaction("rec","readwrite"); t.objectStore("rec").delete(k);
    t.oncomplete=res; t.onerror=res; }); }
};

let voices=[];
const FEMALE_NAMES=/sofie|hillevi|female|zira|jenny|aria|libby|sonia|emma|michelle|ana\b|clara|klara|hazel|susan|karen|serena|alva|elin|natasha|salli|astrid|amy|joanna|kendra|kimberly|catherine|polina|lesya|жіноч|helena|laura|paloma|lucia|elvira|katja|hedda|marlene|vicki|amala|denise|eloise|celine|julie|lea\b|zofia|ewa\b|maja|agnieszka|paulina|samantha|martha|moira|tessa|allison|victoria|oksana/i;
/* no \b after "male": Android voice names look like "sv-se-x-cmh#male_2-local"
   and _ is a word char; testing FEMALE first keeps "female..." out of here */
const MALE_NAMES=/mattias|bengt|male|guy|ryan|thomas|william|christopher|eric\b|erik\b|george|daniel|alex\b|fred|david|\bmark\b|james|oliver|brian|klaus|sven\b|ostap|чолов|pablo|raul|alvaro|jorge|enrique|stefan|conrad|bernd|hans\b|killian|henri|mathieu|yves|remy|antoine|claude\b|marek|jacek|krzysztof|aaron|arthur|albert|oskar|johan\b|nils\b/i;
function voiceGender(v){
  if(FEMALE_NAMES.test(v.name)) return "female";
  if(MALE_NAMES.test(v.name)) return "male";
  return "unknown";
}
function voiceScore(v){
  // prefer high-quality system voices
  let s=0;
  if(/natural/i.test(v.name)) s+=4;
  if(/google/i.test(v.name)) s+=3;
  if(/online/i.test(v.name)) s+=1;
  if(v.localService===false) s+=1;
  if(cfg.voiceGender!=="auto" && voiceGender(v)===cfg.voiceGender) s+=8;
  return s;
}
function langVoices(){
  return voices.filter(v=>v.lang.toLowerCase().startsWith(cfg.lang));
}
function pickVoice(force){
  const lv=langVoices().sort((a,b)=>voiceScore(b)-voiceScore(a));
  const cur=voices.find(v=>v.voiceURI===cfg.voiceURI);
  if(force || !cur || !lv.includes(cur)){
    if(lv.length){
      cfg.voiceURI=lv[0].voiceURI; saveCfg();
      // be honest when the device has no voice of the requested gender -
      // otherwise "Male" silently keeps sounding female and looks broken
      if(force && cfg.voiceGender!=="auto" && voiceGender(lv[0])!==cfg.voiceGender){
        toast(cfg.voiceGender==="male"?T().noMaleVoice:T().noFemaleVoice);
      }
    }
  }
  buildVoiceSel();
}
function buildVoiceSel(){
  // only voices for the app's language - the full system list is overwhelming
  const sel=$("voiceSel"); sel.innerHTML="";
  const lv=langVoices().sort((a,b)=>voiceScore(b)-voiceScore(a));
  for(const v of lv){
    const o=document.createElement("option");
    const g=voiceGender(v);
    o.value=v.voiceURI;
    o.textContent=v.name.replace(/Microsoft |Google /,"")+(g!=="unknown"?(g==="female"?" ♀":" ♂"):"");
    sel.appendChild(o);
  }
  if(cfg.voiceURI) sel.value=cfg.voiceURI;
  const warn=$("voiceWarn");
  if(voices.length && !lv.length){
    warn.textContent=T().voiceWarn;
    warn.classList.remove("hidden");
  } else warn.classList.add("hidden");
}
function refreshVoices(){ voices=speechSynthesis.getVoices(); pickVoice(); }
speechSynthesis.onvoiceschanged=refreshVoices;

async function speak(gid){
  const text=TX()[gid]||"";
  const rec=await idb.get(gid);
  showSpoken(text);
  if(rec){
    const url=URL.createObjectURL(rec);
    const a=new Audio(url); a.play(); a.onended=()=>URL.revokeObjectURL(url);
    return;
  }
  if(!text) return;
  const u=new SpeechSynthesisUtterance(text);
  const v=voices.find(v=>v.voiceURI===cfg.voiceURI);
  if(v){ u.voice=v; u.lang=v.lang; }
  else u.lang=T().ttsLang;   // correct pronunciation even without a chosen voice
  u.rate=cfg.rate;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}
function showSpoken(text){
  const el=$("spoken"); el.classList.remove("dim"); el.textContent=text;
  clearTimeout(showSpoken.t);
  showSpoken.t=setTimeout(()=>{ el.classList.add("dim"); el.textContent=T().waiting; }, 6000);
  const log=$("log");
  const time=new Date().toLocaleTimeString(cfg.lang==="sv"?"sv-SE":"en-GB",{hour:"2-digit",minute:"2-digit"});
  log.innerHTML=("<div>"+time+" — <b>"+text+"</b></div>")+log.innerHTML;
  while(log.children.length>6) log.removeChild(log.lastChild);
}

/* ================= detection engine ================= */
let faceLM=null, gestureRec=null, running=false, paused=false;
let lastFire=0;
const armState={};
const neutralNeed={};
function resetArm(id){ delete armState[id]; }

function engineFrame(signals, now){
  if(paused) return;
  if(now-lastFire < cfg.coolMs){ Object.keys(armState).forEach(resetArm); updateChips(signals,now); return; }

  for(const g of GESTURES){
    if(!cfg.enabled[g.id]) continue;
    let active=false, holdNeeded=cfg.holdMs;
    if(g.type==="head"){
      const yaw=cfg.swapLR ? -signals.yaw : signals.yaw;
      active = g.id==="headRight" ? yaw < -cfg.yawThresh : yaw > cfg.yawThresh;
      if(neutralNeed[g.id]){ if(Math.abs(signals.yaw)<cfg.yawThresh*0.5) neutralNeed[g.id]=false; else active=false; }
    } else if(g.type==="pitch"){
      active = g.id==="headUp" ? signals.pitch > cfg.pitchThresh : signals.pitch < -cfg.pitchThresh;
      if(neutralNeed[g.id]){ if(Math.abs(signals.pitch)<cfg.pitchThresh*0.5) neutralNeed[g.id]=false; else active=false; }
    } else if(g.type==="mouth"){
      active = signals.mouth > 0.5;
      if(neutralNeed[g.id]){ if(signals.mouth<0.2) neutralNeed[g.id]=false; active=false; }
    } else if(g.type==="blink"){
      active = signals.blink;
      holdNeeded = cfg.blinkMs;
      if(neutralNeed[g.id]){ if(!signals.blink) neutralNeed[g.id]=false; active=false; }
    } else if(g.type==="brow"){
      active = signals.brow > 0.55;
      if(neutralNeed[g.id]){ if(signals.brow<0.3) neutralNeed[g.id]=false; active=false; }
    } else if(g.type==="hand"){
      active = signals.hand===g.id && signals.handScore>0.55;
      holdNeeded = Math.max(cfg.holdMs, 800);
    }

    if(active){
      if(!armState[g.id]) armState[g.id]={since:now};
      else if(now-armState[g.id].since >= holdNeeded){
        resetArm(g.id);
        neutralNeed[g.id]=true;
        lastFire=now;
        speak(g.id);
        return;
      }
    } else resetArm(g.id);
  }
  updateChips(signals, now);
}

function updateChips(signals, now){
  for(const g of GESTURES){
    const chip=chipEls[g.id]; if(!chip) continue;
    const st=armState[g.id];
    const need=(g.type==="blink")?cfg.blinkMs:(g.type==="hand"?Math.max(cfg.holdMs,800):cfg.holdMs);
    const p=st?Math.min(1,(now-st.since)/need):0;
    chip.classList.toggle("hot", p>0);
    chip.querySelector("i").style.width=(p*100)+"%";
  }
}

/* ================= camera + mediapipe loop ================= */
const video=$("video");
let lastDetect=0;
let pitchNeutral=0;      // resting head-tilt angle, learned at startup
let pitchBoot=75;        // ~5 s of fast calibration frames

async function initVision(){
  const fileset=await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  const FACE_MODEL="https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task";
  const HAND_MODEL="https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task";
  async function make(cls, opts){
    try { return await cls.createFromOptions(fileset, { ...opts, baseOptions:{ ...opts.baseOptions, delegate:"GPU" } }); }
    catch(e){ return await cls.createFromOptions(fileset, { ...opts, baseOptions:{ ...opts.baseOptions, delegate:"CPU" } }); }
  }
  faceLM=await make(FaceLandmarker,{
    baseOptions:{ modelAssetPath:FACE_MODEL },
    outputFaceBlendshapes:true, runningMode:"VIDEO", numFaces:1
  });
  gestureRec=await make(GestureRecognizer,{
    baseOptions:{ modelAssetPath:HAND_MODEL },
    runningMode:"VIDEO", numHands:1
  });
}

async function initCamera(){
  const stream=await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"user", width:{ideal:640}, height:{ideal:480} }, audio:false });
  video.srcObject=stream;
  await new Promise(r=>video.onloadedmetadata=r);
}

function getBlend(cats,name){
  const c=cats.find(x=>x.categoryName===name); return c?c.score:0;
}

function loop(now){
  requestAnimationFrame(loop);
  if(!running || video.readyState<2) return;
  if(now-lastDetect < 66) return;   // ~15 fps detection
  lastDetect=now;

  const signals={ yaw:0, pitch:0, blink:false, brow:0, mouth:0, hand:null, handScore:0, face:false };
  try{
    const f=faceLM.detectForVideo(video, now);
    if(f.faceLandmarks && f.faceLandmarks.length){
      signals.face=true;
      const lm=f.faceLandmarks[0];
      const nose=lm[1], lc=lm[234], rc=lm[454];
      const dL=Math.hypot(nose.x-lc.x, nose.y-lc.y);
      const dR=Math.hypot(nose.x-rc.x, nose.y-rc.y);
      signals.yaw=(dL-dR)/Math.max(0.001,(dL+dR));
      // pitch: true 3D tilt - the chin->forehead vector leans towards the
      // camera (z) when the head tilts. Angle in radians, + = up, - = down.
      // Auto-calibrates to the person's resting posture the first seconds,
      // then re-centres very slowly while near neutral.
      const fh=lm[10], ch=lm[152];
      const vx=fh.x-ch.x, vy=fh.y-ch.y, vz=fh.z-ch.z;
      const ang=Math.atan2(vz, Math.hypot(vx,vy));
      if(pitchBoot>0){ pitchNeutral+=(ang-pitchNeutral)*0.2; pitchBoot--; }
      else if(Math.abs(ang-pitchNeutral)<cfg.pitchThresh*0.5) pitchNeutral+=(ang-pitchNeutral)*0.03;
      signals.pitch=ang-pitchNeutral;
      if(f.faceBlendshapes && f.faceBlendshapes.length){
        const cats=f.faceBlendshapes[0].categories;
        const bl=getBlend(cats,"eyeBlinkLeft"), br=getBlend(cats,"eyeBlinkRight");
        signals.blink=(bl>0.5 && br>0.5);
        signals.brow=getBlend(cats,"browInnerUp");
        signals.mouth=getBlend(cats,"jawOpen");
      }
    }
    const g=gestureRec.recognizeForVideo(video, now);
    if(g.gestures && g.gestures.length && g.gestures[0].length){
      const top=g.gestures[0][0];
      if(top.categoryName!=="None"){ signals.hand=top.categoryName; signals.handScore=top.score; }
    }
  }catch(e){ /* one bad frame is fine */ }

  $("statusPill").textContent=signals.face?T().seeing:T().looking;
  $("statusPill").classList.toggle("on", signals.face);
  $("stage").classList.toggle("seen", signals.face);
  const dot=$("yawDot");
  dot.style.left=(50 - Math.max(-1,Math.min(1,signals.yaw/0.45))*40)+"%";

  engineFrame(signals, now);
}

/* ================= settings ================= */
let mediaRecorder=null, recChunks=[], recId=null;
async function toggleRecord(gid, btn){
  if(mediaRecorder && mediaRecorder.state==="recording"){ mediaRecorder.stop(); return; }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recChunks=[]; recId=gid;
    mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>recChunks.push(e.data);
    mediaRecorder.onstop=async ()=>{
      stream.getTracks().forEach(tr=>tr.stop());
      const blob=new Blob(recChunks,{type:mediaRecorder.mimeType||"audio/webm"});
      await idb.put(recId, blob);
      btn.classList.remove("recording");
      toast(T().recSaved);
      buildSettings();
    };
    mediaRecorder.start();
    btn.classList.add("recording");
    toast(T().recStart);
  }catch(e){ toast(T().recFail); }
}

async function buildSettings(){
  const list=$("gestureList"); list.innerHTML="";
  const t=T();
  for(const g of GESTURES){
    const card=document.createElement("div"); card.className="g-card";
    const hasRec=!!(await idb.get(g.id));
    card.innerHTML=
      '<div class="g-top"><span class="g-icon">'+g.icon+'</span>'+
      '<span class="g-name">'+t.g[g.id].name+'</span>'+
      '<label class="switch"><input type="checkbox" data-en="'+g.id+'" '+(cfg.enabled[g.id]?"checked":"")+'><span class="tr"></span></label></div>'+
      '<div class="g-row">'+
      '<input type="text" data-txt="'+g.id+'" value="'+(TX()[g.id]||"").replace(/"/g,"&quot;")+'" placeholder="'+t.phrasePh+'">'+
      '<button class="sm-btn" data-test="'+g.id+'" title="Test">▶</button>'+
      '<button class="sm-btn rec" data-rec="'+g.id+'" title="Record">🎤</button>'+
      (hasRec?'<button class="sm-btn" data-clr="'+g.id+'" title="Delete recording">✕</button>':"")+
      '</div>'+
      (hasRec?'<div class="g-voice">'+t.recExists+'</div>':"");
    list.appendChild(card);
  }
  list.querySelectorAll("[data-en]").forEach(el=>el.onchange=()=>{ cfg.enabled[el.dataset.en]=el.checked; saveCfg(); buildMainChips(); });
  list.querySelectorAll("[data-txt]").forEach(el=>el.onchange=()=>{ TX()[el.dataset.txt]=el.value.trim(); saveCfg(); buildMainChips(); });
  list.querySelectorAll("[data-test]").forEach(el=>el.onclick=()=>speak(el.dataset.test));
  list.querySelectorAll("[data-rec]").forEach(el=>el.onclick=()=>toggleRecord(el.dataset.rec, el));
  list.querySelectorAll("[data-clr]").forEach(el=>el.onclick=async ()=>{ await idb.del(el.dataset.clr); toast(T().recGone); buildSettings(); });
}

function bindGlobal(){
  const pairs=[["rateRange","rate",v=>v+"×"],["holdRange","holdMs",v=>v+" ms"],
    ["yawRange","yawThresh",v=>v],["pitchRange","pitchThresh",v=>v],
    ["blinkRange","blinkMs",v=>v+" ms"],["coolRange","coolMs",v=>(v/1000)+" s"]];
  for(const [rid,key,fmt] of pairs){
    const r=$(rid), val=$(rid.replace("Range","Val"));
    r.value=cfg[key]; val.textContent=fmt(cfg[key]);
    r.oninput=()=>{ cfg[key]=parseFloat(r.value); val.textContent=fmt(r.value); saveCfg(); };
  }
  $("swapLR").checked=cfg.swapLR;
  $("swapLR").onchange=e=>{ cfg.swapLR=e.target.checked; saveCfg(); };
  $("voiceSel").onchange=e=>{ cfg.voiceURI=e.target.value; saveCfg(); };
  $("genderSel").onchange=e=>{ cfg.voiceGender=e.target.value; saveCfg(); pickVoice(true); applyLang(); };
  $("langBtn").onclick=()=>$("langVeil").classList.add("show");
  $("langVeil").onclick=e=>{ if(e.target===$("langVeil")) $("langVeil").classList.remove("show"); };
  $("exportBtn").onclick=()=>{
    const a=document.createElement("a");
    a.href="data:application/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(cfg,null,2));
    a.download="communicator-settings.json"; a.click();
  };
  $("importBtn").onclick=()=>$("importFile").click();
  $("importFile").onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{ try{ JSON.parse(rd.result); // must be valid JSON
      localStorage.setItem("commcfg", rd.result);
      cfg=loadCfg(); saveCfg();  // loadCfg normalises old formats too
      applyLang(); bindGlobal(); buildSettings(); buildMainChips(); pickVoice(); toast(T().cfgImported); }
      catch(err){ toast(T().cfgBad); } };
    rd.readAsText(f);
  };
}

/* ================= view switching & misc ================= */
$("viewBtn").onclick=()=>{
  const s=$("settingsView").classList.toggle("hidden");
  $("mainView").classList.toggle("hidden", !s);
  $("viewBtn").classList.toggle("active", !s);
  if(!s) buildSettings();
};
$("helpBtn").onclick=()=>{ buildInstructions(); $("helpVeil").classList.add("show"); };
$("helpClose").onclick=()=>$("helpVeil").classList.remove("show");
$("helpVeil").onclick=e=>{ if(e.target===$("helpVeil")) $("helpVeil").classList.remove("show"); };
$("fsBtn").onclick=()=>{
  if(document.fullscreenElement){ document.exitFullscreen(); }
  else { document.documentElement.requestFullscreen().catch(()=>{}); }
  keepAwake();
};
document.addEventListener("fullscreenchange",()=>{
  $("fsBtn").classList.toggle("active", !!document.fullscreenElement);
});
$("pauseBtn").onclick=()=>{
  paused=!paused;
  $("pauseBtn").textContent=paused?T().resume:T().pause;
  $("pauseBtn").classList.toggle("paused",paused);
};
function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toast.t); toast.t=setTimeout(()=>t.classList.remove("show"),3200);
}

/* ================= boot ================= */
(async function(){
  await idb.open();
  applyLang();
  $("loading").innerHTML=T().loading;
  $("spoken").textContent=T().waiting;
  refreshVoices();
  bindGlobal();
  buildMainChips();
  keepAwake();
  try{
    await Promise.all([initVision(), initCamera()]);
    $("loading").classList.add("hidden");
    ["spoken","cols","pauseBtn"].forEach(id=>$(id).classList.remove("hidden"));
    running=true;
    requestAnimationFrame(loop);
  }catch(e){
    $("loading").dataset.failed="1";
    $("loading").innerHTML=T().loadFail(e.message);
  }
})();
</script>
